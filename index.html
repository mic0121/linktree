<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Michael Demers — Mentaliste</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #080810;
      --deep: #0d0d1a;
      --gold: #c9a227;
      --gold-light: #e8c44a;
      --gold-dim: rgba(201,162,39,0.15);
      --white: #f0ede6;
      --muted: rgba(240,237,230,0.45);
      --border: rgba(201,162,39,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: var(--black); color: var(--white); font-family: 'Jost', sans-serif; overflow-x: hidden; }

    /* ── Canvas Background ── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    body::after { content: ''; position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, rgba(8,8,16,0.9) 100%); z-index: 1; pointer-events: none; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin-ring { to { transform: rotate(360deg); } }
    @keyframes pulse-orb { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } }

    .container { position: relative; z-index: 2; max-width: 420px; margin: 0 auto; padding: 40px 24px 60px; display: flex; flex-direction: column; align-items: center; }
    .deco-line { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, var(--gold)); margin-bottom: 24px; animation: fadeIn 1s 0.1s ease both; }

    /* ── Avatar ── */
    .avatar-ring { position: relative; width: 110px; height: 110px; margin-bottom: 24px; animation: fadeIn 0.8s 0.2s ease both; }
    .avatar-ring::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(var(--gold) 0deg, transparent 120deg, var(--gold-light) 240deg, transparent 300deg, var(--gold) 360deg); animation: spin-ring 8s linear infinite; }
    .avatar-ring::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: var(--black); }
    .avatar-img { position: relative; z-index: 3; width: 110px; height: 110px; border-radius: 50%; object-fit: cover; object-position: top center; }
    .orb { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.25) 0%, transparent 70%); filter: blur(30px); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-orb 5s ease-in-out infinite; z-index: 2; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 20px; animation: fadeIn 0.8s 0.3s ease both; }
    .name { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .title-tag { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--border); padding: 4px 14px; border-radius: 2px; }

    /* ── Socials ── */
    .socials { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 30px; animation: fadeIn 0.8s 0.4s ease both; }
    .social-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.3s ease; background: rgba(8,8,16,0.5); }
    .social-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .social-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-3px); box-shadow: 0 4px 15px rgba(201,162,39,0.25); }

    /* ── Links ── */
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .link-card { position: relative; display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; text-decoration: none; color: var(--white); transition: all 0.3s ease; animation: slideUp 0.6s ease both; overflow: hidden; }
    .link-card:hover { border-color: rgba(201,162,39,0.6); background: rgba(201,162,39,0.06); transform: translateX(5px); }

    /* Featured (Spectacle) Card */
    .link-card.featured { padding: 0; flex-direction: column; align-items: flex-start; gap: 0; }
    .featured-photo-wrap { width: 100%; position: relative; overflow: hidden; }
    .featured-img { width: 100%; max-width: 420px; height: auto; display: block; object-fit: cover; }
    .featured-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(8,8,16,0.8)); }
    .featured-body { padding: 14px 18px; display: flex; align-items: center; gap: 14px; width: 100%; }

    .link-icon { width: 36px; height: 36px; background: rgba(201,162,39,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-icon svg { width: 18px; height: 18px; fill: var(--gold); }
    
    .link-text { flex: 1; }
    .link-label { font-size: 0.88rem; font-weight: 400; letter-spacing: 0.02em; }
    .link-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .link-arrow { color: var(--gold); font-size: 1rem; opacity: 0.5; transition: 0.3s; }
    .link-card:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    .footer { margin-top: 50px; text-align: center; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); opacity: 0.5; }
  </style>
</head>

<script>
  // Animation de particules (poussière dorée)
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<60; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5 + 0.5,
        speedX: Math.random() * 0.4 - 0.2,
        speedY: Math.random() * 0.4 - 0.2,
        opacity: Math.random() * 0.5 + 0.2
      });
    }
  }

  function animate() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = '#c9a227';
    particles.forEach(p => {
      ctx.globalAlpha = p.opacity;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
      if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', init);
  init();
  animate();
</script>
