<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Michael Demers — Mentaliste</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #080810;
      --deep: #0d0d1a;
      --gold: #c9a227;
      --gold-light: #e8c44a;
      --white: #f0ede6;
      --muted: rgba(240,237,230,0.45);
      --border: rgba(201,162,39,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: var(--black); color: var(--white); font-family: 'Jost', sans-serif; overflow-x: hidden; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin-ring { to { transform: rotate(360deg); } }
    @keyframes pulse-orb { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; } 50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; } }

    .container { position: relative; z-index: 2; max-width: 420px; margin: 0 auto; padding: 48px 24px 64px; display: flex; flex-direction: column; align-items: center; }
    .deco-line { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, var(--gold)); margin-bottom: 28px; animation: fadeIn 1s 0.2s ease both; }

    /* ── Avatar ── */
    .avatar-ring { position: relative; width: 110px; height: 110px; margin-bottom: 24px; animation: fadeIn 0.8s 0.3s ease both; }
    .avatar-ring::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(var(--gold) 0deg, transparent 120deg, var(--gold-light) 240deg, transparent 300deg, var(--gold) 360deg); animation: spin-ring 8s linear infinite; }
    .avatar-ring::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: var(--black); }
    .avatar-img { position: relative; z-index: 3; width: 110px; height: 110px; border-radius: 50%; object-fit: cover; object-position: top center; }
    .orb { position: absolute; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.28) 0%, transparent 70%); filter: blur(30px); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-orb 4s ease-in-out infinite; z-index: 2; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 8px; animation: fadeIn 0.8s 0.45s ease both; }
    .name { font-family: 'Playfair Display', serif; font-size: 1.95rem; font-weight: 700; color: var(--white); }
    .title-tag { margin-top: 8px; display: inline-block; font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--border); padding: 4px 14px; }

    /* ── Socials ── */
    .socials { display: flex; gap: 16px; margin: 22px 0 30px; animation: fadeIn 0.8s 0.55s ease both; }
    .social-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.3s ease; }
    .social-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .social-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,162,39,0.2); }

    /* ── Links ── */
    .links { width: 100%; display: flex; flex-direction: column; gap: 11px; }
    .link-card { position: relative; display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; text-decoration: none; color: var(--white); transition: all 0.3s ease; animation: slideUp 0.6s ease both; }
    .link-card:hover { border-color: rgba(201,162,39,0.5); background: rgba(201,162,39,0.05); transform: translateX(4px); }
    
    .link-icon { width: 34px; height: 34px; background: rgba(201,162,39,0.1); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-icon svg { width: 18px; height: 18px; fill: var(--gold); }
    
    .link-text { flex: 1; }
    .link-label { font-size: 0.87rem; font-weight: 400; }
    .link-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .link-arrow { color: var(--gold); font-size: 0.9rem; transition: all 0.3s ease; }

    /* Footer */
    .footer { margin-top: 40px; text-align: center; opacity: 0.3; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; }
  </style>
</head>
